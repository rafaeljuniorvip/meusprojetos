version: "3.8"

services:
  meusprojetos:
    image: ghcr.io/rafaeljuniorvip/meusprojetos:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GITS_PATH=/app/data/gits
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-8192}
      - SCAN_DELAY_SECONDS=${SCAN_DELAY_SECONDS:-1}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS}
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - meusprojetos-data:/app/data
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.meusprojetos.rule=Host(`projetos.rafaeljunior.vip`)"
        - "traefik.http.routers.meusprojetos.entrypoints=websecure"
        - "traefik.http.routers.meusprojetos.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.meusprojetos.loadbalancer.server.port=5815"
    networks:
      - minha_rede

volumes:
  meusprojetos-data:

networks:
  minha_rede:
    external: true
